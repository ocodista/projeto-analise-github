name: E2E Tests on Preview

on:
  workflow_run:
    workflows: ["Deploy PR Preview"]
    types: [completed]

permissions:
  pull-requests: write
  checks: write

jobs:
  e2e:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve preview URL
        id: preview
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "url=https://ocodista.github.io/projeto-analise-github/pr-${SHORT_SHA}/" >> "$GITHUB_OUTPUT"

      - name: Wait for preview deployment
        run: |
          URL="${{ steps.preview.outputs.url }}"
          for i in $(seq 1 30); do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Preview is live at $URL"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Preview did not become available"
          exit 1

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.url }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
